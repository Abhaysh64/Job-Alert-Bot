name: Daily Job Alert Digest

on:
  schedule:
    # Runs every day at 8:00 AM IST (2:30 AM UTC)
    - cron: "30 2 * * *"
  workflow_dispatch:   # lets you trigger manually from GitHub UI

permissions:
  contents: write      # needed to commit seen_jobs.json back to repo

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job alert script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python job_alert.py

      - name: Commit updated seen_jobs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          git diff --staged --quiet || git commit -m "chore: update seen jobs [skip ci]"
          git push
